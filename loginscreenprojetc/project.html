<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link rel="stylesheet" href="logstyle/project01.css">
    <link rel="stylesheet" href="logstyle/project02.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="img">
                
            </div>
            <div id="form">
                <h1>
                    Log in
                </h1>
                <p>
                    Seja Bem-Vindo(a)
                </p>
                <form action="#" method="post" id="link">
                    <div class="camp">
                        <span class="material-symbols-outlined">person</span>
                        <input type="email" name="log" id="ilog" placeholder="e-mail" required autocomplete="email" maxlength="30">
                        <label for="ilog">email</label>
                    </div>
                    <div class="camp">
                        <span class="material-symbols-outlined">vpn_key</span>
                        <input type="password" name="pass" id="ipass" placeholder="password" maxlength="8" required autocomplete="current-password">
                        <label for="ipass">password</label>
                    </div>
                    <input type="submit" value="Log in" class="button">
                    <a href="#" class="button">forget my password</a>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
